<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - FraudGuard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="nav">
        <div class="nav__brand">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-primary"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            FraudGuard
        </div>
        <nav class="nav__links">
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('predict') }}">Predict</a>
            <a href="{{ url_for('about') }}">About</a>
            <a href="{{ url_for('contact') }}" class="active">Contact</a>
        </nav>
    </header>

    <main>
        <div class="page-header fade-in">
            <h1>Partner With Us</h1>
            <p>Join the federated learning network. Enhance your fraud detection while maintaining absolute data privacy.</p>
        </div>

        <div class="form-container fade-in delay-1" style="max-width: 600px;">
            <form class="card">
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="name">Lead Contact Name</label>
                    <input class="form-control" id="name" type="text" placeholder="John Doe" required />
                </div>
                
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="email">Work Email</label>
                    <input class="form-control" id="email" type="email" placeholder="john@bank.com" required />
                </div>
                
                <div class="form-group" style="margin-bottom: 2rem;">
                    <label for="message">Inquiry Details</label>
                    <textarea class="form-control" id="message" rows="5" placeholder="Tell us about your current infrastructure..." required></textarea>
                </div>
                
                <button type="submit" class="btn btn--primary btn--full">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    Send Inquiry
                </button>
            </form>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 FraudGuard Technologies. Federated Fraud Detection.</p>
    </footer>
</body>
</html>
